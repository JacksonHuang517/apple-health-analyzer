name: HealthAnalyzerApp
options:
  bundleIdPrefix: com.jacksonhuang
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  developmentLanguage: zh-Hans
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: HealthAnalyzerApp/Info.plist
    CODE_SIGN_ENTITLEMENTS: HealthAnalyzerApp/HealthAnalyzerApp.entitlements

targets:
  HealthAnalyzerApp:
    type: application
    platform: iOS
    sources:
      - path: HealthAnalyzerApp
        excludes:
          - "Resources/**"
    resources:
      - path: HealthAnalyzerApp/Resources
      - path: HealthAnalyzerApp/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacksonhuang.healthanalyzer
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: HealthAnalyzerApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: HealthAnalyzerApp/HealthAnalyzerApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: ""
    entitlements:
      path: HealthAnalyzerApp/HealthAnalyzerApp.entitlements
